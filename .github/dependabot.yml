version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 2
    rebase-strategy: auto
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-safe-updates:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: gomod
    directory: /apps/analyzer-worker
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: '09:20'
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 2
    rebase-strategy: auto
    labels:
      - dependencies
      - go
    commit-message:
      prefix: chore
      include: scope
    groups:
      go-safe-updates:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: '09:40'
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 2
    rebase-strategy: auto
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-safe-updates:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
