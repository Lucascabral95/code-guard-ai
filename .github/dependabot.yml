version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: gomod
    directory: /apps/analyzer-worker
    schedule:
      interval: weekly
      day: monday
      time: '09:15'
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:45'
    open-pull-requests-limit: 5
    groups:
      docker-compose-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
    open-pull-requests-limit: 5
    groups:
      web-docker-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /apps/api-gateway
    schedule:
      interval: weekly
      day: monday
      time: '10:15'
    open-pull-requests-limit: 5
    groups:
      api-gateway-docker-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /apps/analysis-service
    schedule:
      interval: weekly
      day: monday
      time: '10:30'
    open-pull-requests-limit: 5
    groups:
      analysis-service-docker-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /apps/analyzer-worker
    schedule:
      interval: weekly
      day: monday
      time: '10:45'
    open-pull-requests-limit: 5
    groups:
      analyzer-worker-docker-images:
        patterns:
          - '*'
