services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codeguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeguard}
      POSTGRES_DB: ${POSTGRES_DB:-codeguard}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-codeguard} -d ${POSTGRES_DB:-codeguard}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-codeguard}:${POSTGRES_PASSWORD:-codeguard}@postgres:5432/${POSTGRES_DB:-codeguard}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      AUTH_TYPE: plain
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,application_name
    ports:
      - '${PGBOUNCER_PORT:-6432}:5432'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-codeguard} -d ${POSTGRES_DB:-codeguard}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  analysis-service:
    build:
      context: .
      dockerfile: apps/analysis-service/Dockerfile
    environment:
      PORT: ${ANALYSIS_SERVICE_PORT:-3002}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-codeguard}:${POSTGRES_PASSWORD:-codeguard}@pgbouncer:5432/${POSTGRES_DB:-codeguard}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-codeguard}:${POSTGRES_PASSWORD:-codeguard}@postgres:5432/${POSTGRES_DB:-codeguard}
      DB_POOL_CONNECTION_LIMIT: ${DB_POOL_CONNECTION_LIMIT:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-10}
      DB_APPLICATION_NAME: ${DB_APPLICATION_NAME:-codeguard-analysis-service}
      DB_PGBOUNCER: 'true'
      DB_QUERY_LOGGING: ${DB_QUERY_LOGGING:-false}
      DB_QUERY_METRICS_ENABLED: ${DB_QUERY_METRICS_ENABLED:-true}
      DB_SLOW_QUERY_THRESHOLD_MS: ${DB_SLOW_QUERY_THRESHOLD_MS:-250}
      DB_QUERY_TRACING_ENABLED: ${DB_QUERY_TRACING_ENABLED:-false}
      DB_QUERY_TRACE_SAMPLE_RATE: ${DB_QUERY_TRACE_SAMPLE_RATE:-1}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-codeguard-analysis-service}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      ANALYSIS_STREAM_NAME: ${ANALYSIS_STREAM_NAME:-scan.jobs}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      SAFE_ANALYSIS_MODE: ${SAFE_ANALYSIS_MODE:-true}
      SANDBOX_ANALYSIS_MODE: ${SANDBOX_ANALYSIS_MODE:-docker}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    ports:
      - '3002:3002'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3002/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      PORT: ${API_GATEWAY_PORT:-3001}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL:-http://analysis-service:3002}
      WEB_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      analysis-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  analyzer-worker:
    build:
      context: .
      dockerfile: apps/analyzer-worker/Dockerfile
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      ANALYSIS_STREAM_NAME: ${ANALYSIS_STREAM_NAME:-scan.jobs}
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL:-http://analysis-service:3002}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      WORKER_CONSUMER_NAME: ${WORKER_CONSUMER_NAME:-worker-1}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9101}
      SAFE_ANALYSIS_MODE: ${SAFE_ANALYSIS_MODE:-true}
      SANDBOX_ANALYSIS_MODE: ${SANDBOX_ANALYSIS_MODE:-docker}
      TEMP_DIR: ${TEMP_DIR:-/tmp/codeguard}
      SCANNER_TIMEOUT_SECONDS: ${SCANNER_TIMEOUT_SECONDS:-120}
      SCANNER_OUTPUT_LIMIT_BYTES: ${SCANNER_OUTPUT_LIMIT_BYTES:-10485760}
      SCANNER_DOCKER_NETWORK: ${SCANNER_DOCKER_NETWORK:-none}
      SCANNER_SHARED_VOLUME: ${SCANNER_SHARED_VOLUME:-}
      SCANNER_WORKSPACE_PATH: ${SCANNER_WORKSPACE_PATH:-/workspace}
      SCANNER_MEMORY_LIMIT: ${SCANNER_MEMORY_LIMIT:-2g}
      SCANNER_CPU_LIMIT: ${SCANNER_CPU_LIMIT:-2.0}
      SEMGREP_IMAGE: ${SEMGREP_IMAGE:-semgrep/semgrep:latest}
      TRIVY_IMAGE: ${TRIVY_IMAGE:-aquasec/trivy:latest}
      OSV_SCANNER_IMAGE: ${OSV_SCANNER_IMAGE:-ghcr.io/google/osv-scanner:latest}
      GITLEAKS_IMAGE: ${GITLEAKS_IMAGE:-zricethezav/gitleaks:latest}
      SCORECARD_IMAGE: ${SCORECARD_IMAGE:-gcr.io/openssf/scorecard:latest}
    depends_on:
      redis:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    ports:
      - '${WORKER_METRICS_PORT:-9101}:9101'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
