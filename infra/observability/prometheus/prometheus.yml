global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:3001']

  - job_name: analysis-service
    metrics_path: /metrics
    static_configs:
      - targets: ['analysis-service:3002']

  - job_name: analyzer-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['analyzer-worker:9101']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
