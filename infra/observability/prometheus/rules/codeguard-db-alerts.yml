groups:
  - name: codeguard-database
    rules:
      - alert: CodeGuardDatabaseSlowQueries
        expr: sum(increase(codeguard_database_slow_queries_total[5m])) > 0
        for: 2m
        labels:
          severity: warning
          service: analysis-service
        annotations:
          summary: Slow database queries detected
          description: Prisma observed queries above the configured slow-query threshold during the last 5 minutes.

      - alert: CodeGuardDatabaseHighQueryP95Latency
        expr: histogram_quantile(0.95, sum(rate(codeguard_database_query_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
          service: analysis-service
        annotations:
          summary: Database query p95 latency is high
          description: Prisma query p95 latency is above 500ms for 5 minutes.

      - alert: CodeGuardPostgresConnectionSaturation
        expr: sum(pg_stat_activity_count) / max(pg_settings_max_connections) > 0.8
        for: 5m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: PostgreSQL connection saturation is high
          description: PostgreSQL active connections are above 80% of max_connections for 5 minutes.

      - alert: CodeGuardDatabasePoolTimeoutTooLow
        expr: max(codeguard_database_pool_timeout_seconds) < 5
        for: 10m
        labels:
          severity: warning
          service: analysis-service
        annotations:
          summary: Database pool timeout is configured aggressively
          description: The configured Prisma pool timeout is below 5 seconds, which can cause avoidable request failures during bursts.
